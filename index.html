<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Rating — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #0d0f12;
        --ink-mid: #3d4550;
        --ink-light: #8a93a0;
        --ink-ghost: #c8cfd8;
        --surface: #f4f5f7;
        --card: #ffffff;
        --border: #e8eaed;
        --accent: #10b981;
        --accent-dark: #059669;
        --accent-glow: rgba(16, 185, 129, 0.15);
        --red: #ef4444;
        --red-light: #fef2f2;
      }

      html,
      body {
        height: 100%;
        background: var(--surface);
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* Background decoration */
      body::before {
        content: "";
        position: fixed;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(16, 185, 129, 0.08) 0%,
          transparent 65%
        );
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        bottom: -200px;
        left: -200px;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(16, 185, 129, 0.05) 0%,
          transparent 65%
        );
        pointer-events: none;
      }

      /* ── CARD ── */
      .login-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        width: 100%;
        max-width: 420px;
        padding: 44px 40px 40px;
        box-shadow:
          0 4px 32px rgba(13, 15, 18, 0.08),
          0 1px 4px rgba(13, 15, 18, 0.06);
        position: relative;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── LOGO ── */
      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 11px;
        margin-bottom: 32px;
      }
      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
        flex-shrink: 0;
      }
      .logo-icon svg {
        width: 18px;
        height: 18px;
        color: #fff;
      }
      .logo-text {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .logo-title {
        font-family: "Instrument Serif", serif;
        font-size: 19px;
        color: var(--ink);
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .logo-sub {
        font-size: 10px;
        color: var(--ink-light);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 600;
      }

      /* ── HEADING ── */
      .login-heading {
        font-size: 22px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.02em;
        margin-bottom: 4px;
      }
      .login-sub {
        font-size: 13px;
        color: var(--ink-light);
        margin-bottom: 28px;
      }

      /* ── FORM ── */
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-mid);
        margin-bottom: 6px;
        letter-spacing: 0.02em;
      }
      .input-wrap {
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        height: 15px;
        color: var(--ink-ghost);
        pointer-events: none;
        transition: color 0.18s;
        z-index: 1;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 11px 40px 11px 38px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s,
          background 0.18s;
      }
      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      input[type="text"]:focus ~ .input-icon,
      input[type="password"]:focus ~ .input-icon {
        color: var(--accent);
      }

      /* Password toggle */
      .toggle-pw {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: var(--ink-ghost);
        transition: color 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }
      .toggle-pw:hover {
        color: var(--ink-mid);
      }
      .toggle-pw svg {
        width: 16px;
        height: 16px;
        pointer-events: none;
      }

      /* ── ERROR ── */
      .error-msg {
        display: none;
        background: var(--red-light);
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: var(--red);
        font-weight: 500;
        margin-bottom: 16px;
        align-items: center;
        gap: 8px;
      }
      .error-msg.show {
        display: flex;
        animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      }
      .error-msg svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translateX(-2px);
        }
        20%,
        80% {
          transform: translateX(3px);
        }
        30%,
        50%,
        70% {
          transform: translateX(-4px);
        }
        40%,
        60% {
          transform: translateX(4px);
        }
      }

      /* ── BUTTON ── */
      .btn-login {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 4px;
        letter-spacing: 0.01em;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(16, 185, 129, 0.38);
      }
      .btn-login:active {
        transform: translateY(0);
        box-shadow: 0 3px 8px rgba(16, 185, 129, 0.25);
      }
      .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      /* Spinner inside button */
      .btn-spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }
      .btn-login.loading .btn-spinner {
        display: block;
      }
      .btn-login.loading .btn-label {
        opacity: 0.7;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── FOOTER ── */
      .card-footer {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        text-align: center;
        font-size: 11px;
        color: var(--ink-ghost);
      }

      /* ── SUCCESS FLASH ── */
      .success-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(16, 185, 129, 0.06);
        z-index: 999;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }
      .success-overlay.show {
        display: flex;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .success-badge {
        background: #fff;
        border: 1.5px solid var(--accent);
        border-radius: 16px;
        padding: 24px 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        box-shadow: 0 8px 32px rgba(16, 185, 129, 0.2);
        animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes popIn {
        from {
          transform: scale(0.85);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .success-icon {
        width: 52px;
        height: 52px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
      }
      .success-icon svg {
        width: 24px;
        height: 24px;
        color: #fff;
      }
      .success-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--ink);
      }
      .success-sub {
        font-size: 12px;
        color: var(--ink-light);
      }
    </style>
  </head>
  <body>
    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-badge">
        <div class="success-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M5 13l4 4L19 7"
            />
          </svg>
        </div>
        <div class="success-title">Welcome back!</div>
        <div class="success-sub">Redirecting to admin panel…</div>
      </div>
    </div>

    <!-- Login card -->
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0M13 6H5l-1.5 8h15L17 6h-4zm0 0V4"
            />
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">Driver Rating</span>
          <span class="logo-sub">Admin Panel</span>
        </div>
      </div>

      <h1 class="login-heading">Sign in</h1>
      <p class="login-sub">Enter your credentials to access the dashboard.</p>

      <!-- Error message -->
      <div class="error-msg" id="errorMsg">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
          />
        </svg>
        <span id="errorText">Invalid username or password.</span>
      </div>

      <!-- Username -->
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg
            class="input-icon"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          <input
            type="text"
            id="username"
            placeholder="Admin"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg
            class="input-icon"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            class="toggle-pw"
            type="button"
            id="togglePw"
            aria-label="Toggle password visibility"
          >
            <svg
              id="eyeIcon"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                id="eyePath1"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
              <path
                id="eyePath2"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button
        class="btn-login"
        id="loginBtn"
        type="button"
        onclick="handleLogin()"
      >
        <div class="btn-spinner" id="btnSpinner"></div>
        <span class="btn-label">Sign in to Admin</span>
      </button>

      <div class="card-footer">
        Driver Rating System &copy; 2026 &mdash; Authorized access only
      </div>
    </div>

    <script>
      // ── Credentials ──
      const VALID_USER = "Admin";
      const VALID_PASS = "Cambo@2026";
      const ADMIN_PAGE = "admin.html";

      // Fixed Password toggle
      document
        .getElementById("togglePw")
        .addEventListener("click", function () {
          const pw = document.getElementById("password");
          const icon = document.getElementById("eyeIcon");

          const isShowing = pw.type === "text";
          pw.type = isShowing ? "password" : "text";

          // Update SVG path based on state
          if (isShowing) {
            // Change to "Show Eye" icon (standard eye)
            icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          `;
          } else {
            // Change to "Hide Eye" icon (eye with slash)
            icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.293-3.95M6.64 6.638A9.955 9.955 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.966 9.966 0 01-4.176 5.187M15 12a3 3 0 11-6 0 3 3 0 016 0zM3 3l18 18" />
          `;
          }
        });

      // Allow Enter key
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          const activeEl = document.activeElement;
          if (activeEl.id === "username" || activeEl.id === "password") {
            handleLogin();
          }
        }
      });

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        document.getElementById("errorText").textContent = msg;
        el.classList.remove("show");
        void el.offsetWidth; // trigger reflow
        el.classList.add("show");
      }

      function setLoading(on) {
        const btn = document.getElementById("loginBtn");
        btn.disabled = on;
        btn.classList.toggle("loading", on);
      }

      function handleLogin() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;

        if (!user || !pass) {
          showError("Please enter both username and password.");
          return;
        }

        setLoading(true);

        setTimeout(function () {
          if (user === VALID_USER && pass === VALID_PASS) {
            sessionStorage.setItem("admin_auth", "true");
            document.getElementById("successOverlay").classList.add("show");
            setTimeout(function () {
              window.location.href = ADMIN_PAGE;
            }, 1400);
          } else {
            setLoading(false);
            showError("Invalid username or password.");
            document.getElementById("password").value = "";
            document.getElementById("password").focus();
          }
        }, 700);
      }
    </script>
  </body>
</html>
